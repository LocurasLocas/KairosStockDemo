<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión — Kairos Stock</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --brand: #6366f1;
      --brand-dark: #4f46e5;
      --brand-light: #a5b4fc;
      --brand-bg: #eef2ff;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --bg: #f1f5f9;
      --surface: #ffffff;
      --surface2: #f8fafc;
      --border: #e2e8f0;
      --text: #1e293b;
      --text-muted: #64748b;
      --text-light: #94a3b8;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 12px rgba(0,0,0,.04);
      --shadow-md: 0 4px 16px rgba(0,0,0,.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Sora', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .login-wrapper {
      width: 100%;
      max-width: 420px;
    }

    /* Logo */
    .login-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .75rem;
      margin-bottom: 2rem;
    }
    .logo-icon {
      width: 44px; height: 44px;
      background: var(--brand);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 1.2rem;
    }
    .logo-text {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -.02em;
    }
    .logo-text span { color: var(--brand); }

    /* Card */
    .login-card {
      background: var(--surface);
      border-radius: 16px;
      padding: 2rem;
      box-shadow: var(--shadow-md);
      border: 1px solid var(--border);
    }

    .login-card h1 {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: .35rem;
    }
    .login-card p.subtitle {
      font-size: .875rem;
      color: var(--text-muted);
      margin-bottom: 1.75rem;
    }

    /* Alerts */
    .alert {
      display: flex;
      align-items: flex-start;
      gap: .6rem;
      padding: .75rem 1rem;
      border-radius: 8px;
      font-size: .875rem;
      margin-bottom: 1.25rem;
    }
    .alert-error {
      background: #fef2f2;
      color: #b91c1c;
      border: 1px solid #fecaca;
    }
    .alert-success {
      background: #f0fdf4;
      color: #15803d;
      border: 1px solid #bbf7d0;
    }
    .alert-warning {
      background: #fffbeb;
      color: #b45309;
      border: 1px solid #fde68a;
    }
    .alert i { margin-top: .1rem; flex-shrink: 0; }

    /* Form */
    .form-group {
      margin-bottom: 1.1rem;
    }
    .form-group label {
      display: block;
      font-size: .8rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: .4rem;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .input-wrap {
      position: relative;
    }
    .input-wrap i {
      position: absolute;
      left: .9rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-light);
      font-size: .9rem;
      pointer-events: none;
    }
    .input-wrap input {
      width: 100%;
      padding: .7rem .9rem .7rem 2.4rem;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: 'Sora', sans-serif;
      font-size: .9rem;
      color: var(--text);
      background: var(--surface2);
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .input-wrap input:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(99,102,241,.12);
      background: white;
    }

    /* Toggle password */
    .toggle-pw {
      position: absolute;
      right: .9rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-light);
      cursor: pointer;
      padding: 0;
      font-size: .9rem;
      pointer-events: all;
    }
    .toggle-pw:hover { color: var(--brand); }

    /* Remember + forgot */
    .form-extras {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      font-size: .82rem;
    }
    .remember-label {
      display: flex;
      align-items: center;
      gap: .4rem;
      color: var(--text-muted);
      cursor: pointer;
      user-select: none;
    }
    .remember-label input[type="checkbox"] {
      accent-color: var(--brand);
      width: 15px; height: 15px;
    }

    /* Button */
    .btn-login {
      width: 100%;
      padding: .8rem;
      background: var(--brand);
      color: white;
      border: none;
      border-radius: 8px;
      font-family: 'Sora', sans-serif;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, transform .1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
    }
    .btn-login:hover { background: var(--brand-dark); }
    .btn-login:active { transform: scale(.98); }

    /* Footer */
    .login-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: .78rem;
      color: var(--text-light);
    }
  </style>
</head>
<body>

<div class="login-wrapper">

  <!-- Logo -->
  <div class="login-logo">
    <div class="logo-icon"><img src="{{ url_for('static', filename='kairos-logo.png') }}" alt="Kairos Stock" style="width:100%;height:100%;object-fit:contain;border-radius:6px;"></div>
    <div class="logo-text">Kairos<span> Stock</span></div>
  </div>

  <!-- Card -->
  <div class="login-card">
    <h1>Bienvenido de vuelta</h1>
    <p class="subtitle">Ingresá tus credenciales para continuar</p>

    <!-- Flash messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ 'error' if category == 'error' else 'success' if category == 'success' else 'warning' }}">
          <i class="fas fa-{{ 'circle-xmark' if category == 'error' else 'circle-check' if category == 'success' else 'triangle-exclamation' }}"></i>
          {{ message }}
        </div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('auth.login') }}">

      <!-- Usuario -->
      <div class="form-group">
        <label for="username">Usuario</label>
        <div class="input-wrap">
          <i class="fas fa-user"></i>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Tu nombre de usuario"
            required
            autocomplete="username"
            autofocus
          >
        </div>
      </div>

      <!-- Contraseña -->
      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="input-wrap">
          <i class="fas fa-lock"></i>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            required
            autocomplete="current-password"
          >
          <button type="button" class="toggle-pw" onclick="togglePassword()" title="Mostrar/ocultar contraseña">
            <i class="fas fa-eye" id="eye-icon"></i>
          </button>
        </div>
      </div>

      <!-- Remember me -->
      <div class="form-extras">
        <label class="remember-label">
          <input type="checkbox" name="remember" value="1">
          Recordarme
        </label>
      </div>

      <button type="submit" class="btn-login">
        <i class="fas fa-right-to-bracket"></i>
        Iniciar sesión
      </button>

    </form>
  </div>

  <div class="login-footer">
    Kairos Stock &copy; {{ 2024 }} — Sistema de gestión de inventario
  </div>

</div>

<script>
  function togglePassword() {
    const input = document.getElementById('password');
    const icon  = document.getElementById('eye-icon');
    if (input.type === 'password') {
      input.type = 'text';
      icon.className = 'fas fa-eye-slash';
    } else {
      input.type = 'password';
      icon.className = 'fas fa-eye';
    }
  }
</script>

</body>
</html>
